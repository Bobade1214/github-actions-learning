name: 01 - Building Blocks
on: push

jobs:
    name: echo-hello
    runs-on: ubuntu-latest
    steps:
      -name:  Say hello
      -run: echo "Hello, World!"

    name: echo-goodbye
    runs-on: ubuntu-latest
    steps:
      -name: Failed step
      -runs-on: echo "I will fail"

      -name: Say goodbye
      -runs-on: "Goodbye!"

